apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: free5gc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Charlz234/free5gc-k8s
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: AlertmanagerConfig
      name: free5gc-alertmanager-config
      jsonPointers:
        - /spec/receivers
  destination:
    server: https://kubernetes.default.svc
    namespace: free5gc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true