---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: free5gc-amf
  namespace: monitoring
  labels:
    app: amf
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - free5gc
  selector:
    matchLabels:
      app: amf
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s

