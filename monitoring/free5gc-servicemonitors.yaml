---
# NOTE: UPF runs hostNetwork=true — its metrics port is on the node directly.
# A PodMonitor is more appropriate than ServiceMonitor for hostNetwork pods.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: free5gc-upf
  namespace: monitoring
  labels:
    app: upf
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - free5gc
  selector:
    matchLabels:
      app: upf
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 15s