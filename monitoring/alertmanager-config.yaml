apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: free5gc-alertmanager-config
  namespace: monitoring
  labels:
    alertmanagerConfig: free5gc
spec:
  route:
    receiver: email-receiver
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
  receivers:
    - name: email-receiver
      emailConfigs:
        - to: <recipient@example.com>
          from: <sender@example.com>
          smarthost: smtp.gmail.com:587
          authUsername: <sender@example.com>
          authPassword:
            name: alertmanager-smtp
            key: smtp-password
          requireTLS: true
          sendResolved: true
          headers:
            subject: '[free5GC] {{ .Status | toUpper }} — {{ .CommonLabels.alertname }}'
          html: |
            <h3>{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}</h3>
            <p><b>Severity:</b> {{ .CommonLabels.severity }}</p>
            <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
            <p><b>Description:</b> {{ .CommonAnnotations.description }}</p>
            <p><b>Started:</b> {{ .CommonAnnotations.startsAt }}</p>