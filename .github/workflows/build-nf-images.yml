name: Build free5GC NF Images

on:
  push:
    branches: [master]
    paths:
      - 'docker/Dockerfile.nf'
      - '.github/workflows/build-nf-images.yml'
  workflow_dispatch:
    inputs:
      nf:
        description: 'Build a single NF (leave empty to build all)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/charlz234/free5gc
  FREE5GC_VERSION: v4.2.0
  IMAGE_TAG: v4.2.0-metrics

jobs:
  build:
    name: Build ${{ matrix.nf }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        nf: [nrf, amf, smf, ausf, udm, udr, pcf, nssf]

    steps:
      - name: Checkout free5gc-k8s
        uses: actions/checkout@v4

      - name: Check if this NF is selected
        id: check
        run: |
          REQUESTED="${{ github.event.inputs.nf }}"
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "${{ matrix.nf }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Go modules (via Buildx cache)
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.nf }}
          key: ${{ runner.os }}-buildx-${{ matrix.nf }}-${{ env.FREE5GC_VERSION }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.nf }}-

      - name: Build and push ${{ matrix.nf }}
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.nf
          push: true
          build-args: |
            NF=${{ matrix.nf }}
            FREE5GC_VERSION=${{ env.FREE5GC_VERSION }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.nf }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.nf }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.nf }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.nf }}-new,mode=max
          platforms: linux/amd64

      - name: Rotate Buildx cache
        if: steps.check.outputs.skip == 'false'
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.nf }}
          mv /tmp/.buildx-cache-${{ matrix.nf }}-new /tmp/.buildx-cache-${{ matrix.nf }} \
            2>/dev/null || true

  summary:
    name: Image Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## free5GC NF Image Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| NF | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|----|-------|" >> $GITHUB_STEP_SUMMARY
          for nf in nrf amf smf ausf udm udr pcf nssf; do
            echo "| \`$nf\` | \`ghcr.io/charlz234/free5gc-${nf}:v4.2.0-metrics\` |" \
              >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Enable metrics in \`values.yaml\`: set \`metrics.enabled: true\` per NF." \
            >> $GITHUB_STEP_SUMMARY
