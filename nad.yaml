apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: n2-network
  namespace: free5gc
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "n2-network",
    "type": "host-device",
    "device": "n2dummy",
    "ipam": {
      "type": "static",
      "addresses": [
        {"address": "10.0.2.3/24"}
      ]
    }
  }'
---
