apiVersion: apps/v1
kind: Deployment
metadata:
  name: udr
  namespace: free5gc
  labels:
    app: udr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udr
  template:
    metadata:
      labels:
        app: udr
    spec:
      containers:
        - name: udr
          image: free5gc/udr:v4.2.0
          command: ["./udr", "-c", "./config/udrcfg.yaml"]
          volumeMounts:
            - name: config
              mountPath: /free5gc/config/udrcfg.yaml
              subPath: udrcfg.yaml
      volumes:
        - name: config
          configMap:
            name: udr-config
---
apiVersion: v1
kind: Service
metadata:
  name: udr-nudr
  namespace: free5gc
spec:
  selector:
    app: udr
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
