apiVersion: apps/v1
kind: Deployment
metadata:
  name: udm
  namespace: {{ .Values.global.namespace }}
  labels:
    app: udm
spec:
  replicas: {{ .Values.udm.replicas }}
  selector:
    matchLabels:
      app: udm
  template:
    metadata:
      labels:
        app: udm
    spec:
      containers:
        - name: udm
          image: {{ .Values.udm.image.repository }}:{{ .Values.udm.image.tag }}
          command: ["./udm", "-c", "./config/udmcfg.yaml"]
          ports:
            - name: sbi
              containerPort: 8000
            {{- if .Values.udm.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.udm.metrics.port }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /free5gc/config/udmcfg.yaml
              subPath: udmcfg.yaml
      volumes:
        - name: config
          configMap:
            name: udm-config
---
apiVersion: v1
kind: Service
metadata:
  name: udm-nudm
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: udm
  ports:
    - name: sbi
      port: 8000
      targetPort: 8000
    {{- if .Values.udm.metrics.enabled }}
    - name: metrics
      port: {{ .Values.udm.metrics.port }}
      targetPort: {{ .Values.udm.metrics.port }}
    {{- end }}
  type: ClusterIP