apiVersion: v1
kind: ConfigMap
metadata:
  name: udr-config
  namespace: free5gc
data:
  udrcfg.yaml: |
    info:
      version: 1.1.0
      description: UDR initial local configuration
    configuration:
      dbConnectorType: mongodb
      sbi:
        scheme: http
        registerIPv4: udr-nudr
        bindingIPv4: 0.0.0.0
        port: 8000
      mongodb:
        name: free5gc
        url: mongodb://mongodb:27017
      nrfUri: http://nrf-nnrf:8000
    logger:
      enable: true
      level: info
      reportCaller: false
