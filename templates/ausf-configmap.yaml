apiVersion: v1
kind: ConfigMap
metadata:
  name: ausf-config
  namespace: free5gc
data:
  ausfcfg.yaml: |
    info:
      version: 1.0.3
      description: AUSF initial local configuration
    configuration:
      sbi:
        scheme: http
        registerIPv4: ausf-nausf
        bindingIPv4: 0.0.0.0
        port: 8000
      serviceNameList:
        - nausf-auth
      nrfUri: http://nrf-nnrf:8000
      plmnSupportList:
        - mcc: 208
          mnc: 93
      groupId: ausfGroup001
      eapAkaSupiImsiPrefix: false
    logger:
      enable: true
      level: info
      reportCaller: false
    metrics:
      enable: true
      scheme: http
      bindingIPv4: 0.0.0.0
      port: 9089