apiVersion: v1
kind: ConfigMap
metadata:
  name: pcf-config
  namespace: free5gc
data:
  pcfcfg.yaml: |
    info:
      version: 1.0.2
      description: PCF initial local configuration
    configuration:
      pcfName: PCF
      sbi:
        scheme: http
        registerIPv4: pcf-npcf
        bindingIPv4: 0.0.0.0
        port: 8000
      timeFormat: 2019-01-02 15:04:05
      defaultBdtRefId: BdtPolicyId-
      nrfUri: http://nrf-nnrf:8000
      serviceList:
        - serviceName: npcf-am-policy-control
        - serviceName: npcf-smpolicycontrol
          suppFeat: 3fff
        - serviceName: npcf-bdtpolicycontrol
        - serviceName: npcf-policyauthorization
          suppFeat: 3
        - serviceName: npcf-eventexposure
        - serviceName: npcf-ue-policy-control
      mongodb:
        name: free5gc
        url: mongodb://mongodb:27017
      locality: area1
      metrics:
        enable: true
        scheme: http
        bindingIPv4: 0.0.0.0
        port: 9089
    logger:
      enable: true
      level: info
      reportCaller: false