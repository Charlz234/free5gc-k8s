apiVersion: v1
kind: ConfigMap
metadata:
  name: nssf-config
  namespace: free5gc
data:
  nssfcfg.yaml: |
    info:
      version: 1.0.2
      description: NSSF initial local configuration
    configuration:
      nssfName: NSSF
      sbi:
        scheme: http
        registerIPv4: nssf-nnssf
        bindingIPv4: 0.0.0.0
        port: 8000
      serviceNameList:
        - nnssf-nsselection
        - nnssf-nssaiavailability
      nrfUri: http://nrf-nnrf:8000
      supportedPlmnList:
        - mcc: 208
          mnc: 93
      supportedNssaiInPlmnList:
        - plmnId:
            mcc: 208
            mnc: 93
          supportedSnssaiList:
            - sst: 1
              sd: 010203
    logger:
      enable: true
      level: info
      reportCaller: false
