apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: free5gc
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    log_type all
    persistence false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: free5gc
  labels:
    app: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 1883
              name: mqtt
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: config
          configMap:
            name: mosquitto-config

---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: free5gc
  labels:
    app: mosquitto
spec:
  selector:
    app: mosquitto
  ports:
    - port: 1883
      targetPort: 1883
      name: mqtt
  type: ClusterIP